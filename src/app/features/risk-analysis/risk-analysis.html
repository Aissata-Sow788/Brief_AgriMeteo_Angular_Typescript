@if (risk && prediction) {
  <div class="risk-wrapper">

    <!-- BADGE INDICE DE RISQUE -->
    <div class="risk-header">
      <span class="risk-section-label">🌾 Indice de Risque Agricole</span>
    </div>

    <div class="risk-badge" [style.border-color]="risk.color">
      <div class="risk-info">
        <span class="risk-score" [style.color]="risk.color">{{ risk.score }}<span class="risk-unit">/100</span></span>
        <span class="risk-label">{{ risk.label }}</span>
      </div>
      <div class="risk-dot" [style.background-color]="risk.color"></div>
    </div>

    <!-- BARRE DE PROGRESSION (jauge) -->
    <div class="risk-bar-track">
      <div
        class="risk-bar-fill"
        [style.width.%]="risk.score"
        [style.background-color]="risk.color"
      ></div>
    </div>
    <div class="risk-bar-labels">
      <span>Faible</span>
      <span>Modéré</span>
      <span>Élevé</span>
    </div>

    <!-- GRAPHIQUE 7 JOURS -->
    <div class="chart-section">
      <p class="chart-label">📈 Températures simulées — 7 derniers jours</p>
      <canvas #chartCanvas class="chart-canvas"></canvas>
    </div>

  </div>
}
